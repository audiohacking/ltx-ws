# Hyperparameters only — paths injected at runtime (see lora_t2v.yaml header).
model:
  text_encoder_path: mlx-community/gemma-3-12b-it-4bit
  training_mode: lora

lora:
  rank: 64
  alpha: 64
  dropout: 0.0
  target_modules:
    - to_k
    - to_q
    - to_v
    - to_out.0

optimization:
  learning_rate: 5.0e-4
  steps: 3000
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  weight_decay: 0.0
  enable_gradient_checkpointing: true
  scheduler_type: linear
  scheduler_params:
    start_factor: 1.0
    end_factor: 0.1

training_strategy:
  name: video_to_video
  first_frame_conditioning_p: 0.1
  reference_latents_dir: reference_latents

flow_matching:
  timestep_sampling_mode: shifted_logit_normal

validation:
  prompts:
    - "a person walking in a park"
  reference_downscale_factor: 2
  video_dims: [704, 480, 25]
  frame_rate: 24.0
  inference_steps: 8
  interval: 500
  guidance_scale: 4.0
  stg_scale: 0.0
  seed: 42
  generate_audio: false
  skip_initial_validation: true
  include_reference_in_output: true

checkpoints:
  interval: 500
  keep_last_n: 3

seed: 42
